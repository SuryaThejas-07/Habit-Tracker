<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings - HabitFlow</title>
    <meta name="description" content="Manage profile, preferences, timezone, reminders, and account settings." />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="icon" href="assets/images/logo.png" type="image/png" />
    <script src="scripts/theme.js"></script>
</head>

<body>
    <div class="toast-container" id="toastContainer"></div>

    <nav class="navbar">
        <div class="navbar-brand">
            <img class="navbar-logo" src="assets/images/logo.png" alt="HabitFlow" />
            <span class="navbar-title">HabitFlow</span>
        </div>
        <nav class="navbar-nav">
            <a href="index.html" class="nav-link">My Habits</a>
            <a href="dashboard.html" class="nav-link">Analytics</a>
            <a href="planner.html" class="nav-link">Planner</a>
            <a href="reports.html" class="nav-link">Reports</a>
            <a href="settings.html" class="nav-link active">Settings</a>
        </nav>
        <div class="navbar-actions">
            <span class="user-greeting" id="userGreeting"></span>
            <button class="theme-toggle-btn" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
            <button class="btn btn-secondary btn-sm" onclick="logout()">Sign Out</button>
        </div>
    </nav>

    <main class="page-wrapper">
        <div class="container">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Profile & Settings</h1>
                    <p class="page-subtitle">Control preferences, reminders, timezone, and account security.</p>
                </div>
            </div>

            <div class="settings-grid">
                <section class="chart-card">
                    <h3 class="chart-title"><span>⚙️</span> Preferences</h3>
                    <form id="settingsForm">
                        <div class="form-group">
                            <label class="form-label" for="timezoneInput">Timezone</label>
                            <input class="form-control" id="timezoneInput" type="text" placeholder="Asia/Kolkata" required />
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="weekStartInput">Week Start Day</label>
                            <select class="form-control" id="weekStartInput">
                                <option value="monday">Monday</option>
                                <option value="sunday">Sunday</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="preferredThemeInput">Preferred Theme</label>
                            <select class="form-control" id="preferredThemeInput">
                                <option value="light">Light</option>
                                <option value="dark">Dark</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="remindersEnabledInput">Reminders</label>
                            <select class="form-control" id="remindersEnabledInput">
                                <option value="0">Disabled</option>
                                <option value="1">Enabled</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="reminderTimeInput">Reminder Time</label>
                            <input class="form-control" id="reminderTimeInput" type="time" value="08:00" />
                        </div>

                        <button class="btn btn-primary" type="submit" id="saveSettingsBtn">Save Preferences</button>
                    </form>
                </section>

                <section class="chart-card">
                    <h3 class="chart-title"><span>👤</span> Account Management</h3>
                    <form id="accountForm">
                        <div class="form-group">
                            <label class="form-label" for="accountNameInput">Full Name</label>
                            <input class="form-control" id="accountNameInput" type="text" required />
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="accountEmailInput">Email</label>
                            <input class="form-control" id="accountEmailInput" type="email" required />
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="currentPasswordInput">Current Password</label>
                            <input class="form-control" id="currentPasswordInput" type="password" placeholder="Required only when changing password" />
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="newPasswordInput">New Password</label>
                            <input class="form-control" id="newPasswordInput" type="password" placeholder="Leave blank to keep current password" />
                        </div>

                        <button class="btn btn-primary" type="submit" id="saveAccountBtn">Update Account</button>
                    </form>
                </section>
            </div>
        </div>
    </main>

    <script src="scripts/auth.js"></script>
    <script src="scripts/settings.js"></script>
</body>

</html>
